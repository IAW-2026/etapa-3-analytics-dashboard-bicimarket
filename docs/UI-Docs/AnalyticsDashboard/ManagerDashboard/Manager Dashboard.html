document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ns-serif;\">\n\n  <!-- ================= SIDEBAR ================= -->\n  <aside style=\"width:248px;flex-shrink:0;background:var(--sidebar);color:var(--sidebar-foreground);display:flex;flex-direction:column;border-right:1px solid var(--sidebar-border);\">\n    <div style=\"padding:22px 20px 18px;display:flex;align-items:center;gap:11px;\">\n      <div style=\"width:34px;height:34px;border-radius:9px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n        <i data-lucide=\"bike\" style=\"width:20px;height:20px;color:var(--primary-foreground);\"><\u002Fi>\n      <\u002Fdiv>\n      <div style=\"line-height:1.15;\">\n        <div style=\"font-size:15px;font-weight:700;letter-spacing:-.01em;\">BiciMarket<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--sidebar-muted);font-weight:500;\">Manager Dashboard<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:6px 14px 4px;\">\n      <div style=\"font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sidebar-muted);padding:8px 10px 6px;\">Analítica<\u002Fdiv>\n    <\u002Fdiv>\n    <nav style=\"flex:1;overflow-y:auto;padding:0 14px;display:flex;flex-direction:column;gap:2px;\">\n      <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"7\">\n        <button class=\"navitem\" onclick=\"{{ item.onClick }}\" style=\"display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border:none;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13.5px;text-align:left;background:{{ item.bg }};color:{{ item.color }};font-weight:{{ item.weight }};transition:background .14s;\">\n          <i data-lucide=\"{{ item.icon }}\" style=\"width:18px;height:18px;opacity:.95;\"><\u002Fi>\n          <span style=\"flex:1;\">{{ item.label }}<\u002Fspan>\n          <span style=\"width:6px;height:6px;border-radius:50%;background:{{ item.dot }};\"><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"padding:14px;border-top:1px solid var(--sidebar-border);\">\n      <div style=\"display:flex;align-items:center;gap:11px;padding:8px;border-radius:10px;background:var(--sidebar-accent);\">\n        <div style=\"width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--chart-2),var(--chart-4));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;\">AM<\u002Fdiv>\n        <div style=\"line-height:1.2;flex:1;min-width:0;\">\n          <div style=\"font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Alex Morgan<\u002Fdiv>\n          <div style=\"font-size:11px;color:var(--sidebar-muted);\">Gerente General<\u002Fdiv>\n        <\u002Fdiv>\n        <i data-lucide=\"chevrons-up-down\" style=\"width:15px;height:15px;color:var(--sidebar-muted);\"><\u002Fi>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- ================= MAIN ================= -->\n  <main style=\"flex:1;display:flex;flex-direction:column;min-width:0;\">\n\n    <!-- TOPBAR -->\n    <header style=\"height:66px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:20px;\">\n      <div style=\"min-width:0;\">\n        <div style=\"font-size:17px;font-weight:650;letter-spacing:-.01em;line-height:1.1;\">{{ title }}<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:var(--muted-foreground);margin-top:2px;\">{{ subtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;flex-shrink:0;\">\n        <div style=\"display:flex;align-items:center;gap:2px;background:var(--muted);border-radius:9px;padding:3px;\">\n          <sc-for list=\"{{ ranges }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <button class=\"pill\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:{{ r.weight }};padding:5px 11px;border-radius:7px;background:{{ r.bg }};color:{{ r.color }};box-shadow:{{ r.shadow }};\">{{ r.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted-foreground);\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 22%,transparent);\"><\u002Fspan>\n          Hace 2s\n        <\u002Fdiv>\n        <div style=\"width:1px;height:24px;background:var(--border);\"><\u002Fdiv>\n        <button class=\"pill\" onclick=\"{{ toggleTheme }}\" title=\"Cambiar tema\" style=\"width:36px;height:36px;border:1px solid var(--border);background:var(--card);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);\">\n          <i data-lucide=\"{{ themeIcon }}\" style=\"width:17px;height:17px;\"><\u002Fi>\n        <\u002Fbutton>\n        <button class=\"pill\" style=\"width:36px;height:36px;border:1px solid var(--border);background:var(--card);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);position:relative;\">\n          <i data-lucide=\"bell\" style=\"width:17px;height:17px;\"><\u002Fi>\n          <span style=\"position:absolute;top:8px;right:9px;width:6px;height:6px;border-radius:50%;background:var(--destructive);\"><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- SCROLL CONTENT -->\n    <div class=\"scroll\" style=\"flex:1;overflow-y:auto;padding:26px 28px 40px;\">\n\n      <!-- ============ RESUMEN EJECUTIVO ============ -->\n      <div style=\"display:{{ ovDisplay }};max-width:1180px;margin:0 auto;\">\n\n        <!-- AI BRIEFING -->\n        <div style=\"border-radius:16px;padding:22px 24px;margin-bottom:22px;background:linear-gradient(120deg, color-mix(in srgb,var(--primary) 14%,var(--card)), var(--card) 70%);border:1px solid color-mix(in srgb,var(--primary) 28%,var(--border));position:relative;overflow:hidden;\">\n          <div style=\"display:flex;gap:16px;align-items:flex-start;\">\n            <div style=\"width:42px;height:42px;border-radius:11px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n              <i data-lucide=\"sparkles\" style=\"width:22px;height:22px;color:var(--primary-foreground);\"><\u002Fi>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:0;\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;\">\n                <span style=\"font-size:15px;font-weight:650;\">Buenos días, Alex<\u002Fspan>\n                <span style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--primary);background:color-mix(in srgb,var(--primary) 14%,transparent);padding:3px 8px;border-radius:20px;\">Resumen IA<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <sc-for list=\"{{ briefing }}\" as=\"b\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--card-foreground);\">\n                    <i data-lucide=\"{{ b.icon }}\" style=\"width:15px;height:15px;color:{{ b.color }};flex-shrink:0;\"><\u002Fi>\n                    <span>{{ b.text }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:9px;margin-top:16px;flex-wrap:wrap;\">\n                <button onclick=\"{{ goCopilot }}\" style=\"display:flex;align-items:center;gap:7px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:550;padding:8px 14px;border-radius:9px;background:var(--primary);color:var(--primary-foreground);\">\n                  <i data-lucide=\"message-circle\" style=\"width:15px;height:15px;\"><\u002Fi> Hacer una pregunta\n                <\u002Fbutton>\n                <button style=\"border:1px solid var(--border);cursor:pointer;font-family:inherit;font-size:13px;font-weight:550;padding:8px 14px;border-radius:9px;background:var(--card);color:var(--foreground);\">Ver reporte completo<\u002Fbutton>\n                <button style=\"border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;padding:8px 12px;border-radius:9px;background:transparent;color:var(--muted-foreground);\">Descartar<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- KPI CARDS -->\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;\">\n          <sc-for list=\"{{ ovKpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;\">\n                <span style=\"font-size:11.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-foreground);\">{{ k.label }}<\u002Fspan>\n                <i data-lucide=\"{{ k.icon }}\" style=\"width:16px;height:16px;color:var(--muted-foreground);\"><\u002Fi>\n              <\u002Fdiv>\n              <div class=\"mono\" style=\"font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1;\">{{ k.value }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:12px;\">\n                <span style=\"display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:{{ k.deltaColor }};background:{{ k.deltaBg }};padding:3px 8px;border-radius:20px;\">\n                  <i data-lucide=\"{{ k.deltaIcon }}\" style=\"width:12px;height:12px;\"><\u002Fi>{{ k.delta }}\n                <\u002Fspan>\n                <svg viewBox=\"0 0 110 34\" preserveAspectRatio=\"none\" style=\"width:78px;height:30px;overflow:visible;\">\n                  <path d=\"{{ k.sparkArea }}\" fill=\"{{ k.sparkFill }}\"><\u002Fpath>\n                  <path d=\"{{ k.sparkLine }}\" fill=\"none\" stroke=\"{{ k.sparkStroke }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n                <\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- CHARTS ROW 1 -->\n        <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px;\">\n          <!-- Revenue trend -->\n          <div style=\"background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow);\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;\">\n              <div>\n                <div style=\"font-size:14.5px;font-weight:600;\">Tendencia de Ingresos<\u002Fdiv>\n                <div style=\"font-size:12px;color:var(--muted-foreground);margin-top:2px;\">Últimos 30 días · ARS<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:2px;background:var(--muted);border-radius:8px;padding:3px;\">\n                <span style=\"font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:6px;background:var(--card);color:var(--foreground);box-shadow:var(--shadow);\">30d<\u002Fspan>\n                <span style=\"font-size:11.5px;font-weight:500;padding:4px 9px;border-radius:6px;color:var(--muted-foreground);\">90d<\u002Fspan>\n                <span style=\"font-size:11.5px;font-weight:500;padding:4px 9px;border-radius:6px;color:var(--muted-foreground);\">1a<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position:relative;margin-top:14px;\">\n              <svg viewBox=\"0 0 600 200\" preserveAspectRatio=\"none\" style=\"width:100%;height:200px;display:block;\">\n                <defs>\n                  <linearGradient id=\"revgrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                    <stop offset=\"0%\" stop-color=\"var(--primary)\" stop-opacity=\"0.26\"><\u002Fstop>\n                    <stop offset=\"100%\" stop-color=\"var(--primary)\" stop-opacity=\"0\"><\u002Fstop>\n                  <\u002FlinearGradient>\n                <\u002Fdefs>\n                <line x1=\"0\" y1=\"50\" x2=\"600\" y2=\"50\" stroke=\"var(--border)\" stroke-width=\"1\" stroke-dasharray=\"3 5\"><\u002Fline>\n                <line x1=\"0\" y1=\"100\" x2=\"600\" y2=\"100\" stroke=\"var(--border)\" stroke-width=\"1\" stroke-dasharray=\"3 5\"><\u002Fline>\n                <line x1=\"0\" y1=\"150\" x2=\"600\" y2=\"150\" stroke=\"var(--border)\" stroke-width=\"1\" stroke-dasharray=\"3 5\"><\u002Fline>\n                <path d=\"{{ revArea }}\" fill=\"url(#revgrad)\"><\u002Fpath>\n                <path d=\"{{ revLine }}\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <\u002Fsvg>\n              <div style=\"display:flex;justify-content:space-between;font-size:11px;color:var(--muted-foreground);margin-top:8px;\" class=\"mono\">\n                <span>13 May<\u002Fspan><span>20 May<\u002Fspan><span>27 May<\u002Fspan><span>3 Jun<\u002Fspan><span>11 Jun<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Top products -->\n          <div style=\"background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow);\">\n            <div style=\"font-size:14.5px;font-weight:600;margin-bottom:2px;\">Productos Top<\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--muted-foreground);margin-bottom:16px;\">Por ingresos · 30 días<\u002Fdiv>\n            <div style=\"displa              <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:6px;background:var(--muted);border-radius:8px;padding:3px;\">\n                <span style=\"font-size:12px;font-weight:600;padding:5px 11px;border-radius:6px;background:var(--card);box-shadow:var(--shadow);\">Detalle<\u002Fspan>\n                <span style=\"font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;color:var(--muted-foreground);\">Productos<\u002Fspan>\n                <span style=\"font-size:12px;font-weight:500;padding:5px 11px;border-radius:6px;color:var(--muted-foreground);\">Liquidaciones<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:0;\">\n              <div style=\"padding:20px;border-right:1px solid var(--border);\">\n                <div style=\"font-size:13px;font-weight:600;color:var(--muted-foreground);margin-bottom:16px;\">Ingresos · últimas 8 semanas<\u002Fdiv>\n                <svg viewBox=\"0 0 600 160\" preserveAspectRatio=\"none\" style=\"width:100%;height:160px;display:block;\">\n                  <defs><linearGradient id=\"sellergrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0%\" stop-color=\"var(--primary)\" stop-opacity=\"0.24\"><\u002Fstop><stop offset=\"100%\" stop-color=\"var(--primary)\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs>\n                  <line x1=\"0\" y1=\"53\" x2=\"600\" y2=\"53\" stroke=\"var(--border)\" stroke-dasharray=\"3 5\"><\u002Fline>\n                  <line x1=\"0\" y1=\"106\" x2=\"600\" y2=\"106\" stroke=\"var(--border)\" stroke-dasharray=\"3 5\"><\u002Fline>\n                  <path d=\"{{ sellerRevArea }}\" fill=\"url(#sellergrad)\"><\u002Fpath>\n                  <path d=\"{{ sellerRevLine }}\" fill=\"none\" stroke=\"var(--primary)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n                <\u002Fsvg>\n                <div style=\"font-size:13px;font-weight:600;color:var(--muted-foreground);margin:22px 0 14px;\">Mix de Categorías<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:11px;\">\n                  <sc-for list=\"{{ sellerCats }}\" as=\"c\" hint-placeholder-count=\"4\">\n                    <div>\n                      <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;\"><span>{{ c.name }}<\u002Fspan><span class=\"mono\" style=\"color:var(--muted-foreground);\">{{ c.val }}<\u002Fspan><\u002Fdiv>\n                      <div style=\"height:7px;border-radius:6px;background:var(--muted);overflow:hidden;\"><div style=\"height:100%;width:{{ c.width }};background:{{ c.color }};border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-content:start;\">\n                <sc-for list=\"{{ detailMetrics }}\" as=\"m\" hint-placeholder-count=\"6\">\n                  <div style=\"border:1px solid var(--border);border-radius:11px;padding:14px;\">\n                    <div style=\"font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--muted-foreground);margin-bottom:9px;\">{{ m.label }}<\u002Fdiv>\n                    <div class=\"mono\" style=\"font-size:19px;font-weight:600;line-height:1;\">{{ m.value }}<\u002Fdiv>\n                    <div style=\"font-size:11.5px;font-weight:600;color:{{ m.dcolor }};margin-top:7px;\">{{ m.delta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ COPILOTO IA ============ -->\n      <div style=\"display:{{ copilotDisplay }};max-width:1180px;margin:0 auto;width:100%;flex-direction:column;height:100%;\">\n        <div style=\"flex:1;display:flex;flex-direction:column;gap:18px;padding-bottom:8px;\">\n          <!-- Greeting -->\n          <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center;padding:18px 0 4px;\">\n            <div style=\"width:54px;height:54px;border-radius:15px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:14px;\">\n              <i data-lucide=\"sparkles\" style=\"width:27px;height:27px;color:var(--primary-foreground);\"><\u002Fi>\n            <\u002Fdiv>\n            <div style=\"font-size:21px;font-weight:650;letter-spacing:-.01em;\">Copiloto de BiciMarket<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:var(--muted-foreground);margin-top:5px;max-width:440px;\">Preguntá sobre ventas, finanzas, vendedores o clientes. Respondo con datos en tiempo real de tu marketplace.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Conversation -->\n          <div style=\"display:flex;flex-direction:column;gap:16px;\">\n            <!-- user msg -->\n            <div style=\"display:flex;justify-content:flex-end;\">\n              <div style=\"max-width:60%;background:var(--primary);color:var(--primary-foreground);font-size:13.5px;padding:12px 16px;border-radius:14px 14px 4px 14px;\">¿Cómo fueron los ingresos esta semana y quién vendió más?<\u002Fdiv>\n            <\u002Fdiv>\n            <!-- assistant msg -->\n            <div style=\"display:flex;gap:12px;align-items:flex-start;\">\n              <div style=\"width:32px;height:32px;border-radius:9px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;\"><i data-lucide=\"sparkles\" style=\"width:17px;height:17px;color:var(--primary-foreground);\"><\u002Fi><\u002Fdiv>\n              <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:14px;\">\n                <div style=\"background:var(--card);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:16px 18px;font-size:13.5px;line-height:1.55;box-shadow:var(--shadow);\">\n                  Esta semana el marketplace generó <strong>ARS 8,2M<\u002Fstrong> en GMV, un <strong style=\"color:var(--primary);\">+12%<\u002Fstrong> frente a la semana anterior. El jueves fue el día más fuerte. <strong>BiciSur<\u002Fstrong> lideró con ARS 3,1M (38% del total).\n                  <!-- inline chart card -->\n                  <div style=\"margin-top:14px;border:1px solid var(--border);border-radius:11px;padding:16px;background:var(--background);\">\n                    <div style=\"font-size:12px;font-weight:600;color:var(--muted-foreground);margin-bottom:14px;\">Ingresos por día · esta semana<\u002Fdiv>\n                    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:9px;height:110px;\">\n                      <sc-for list=\"{{ cpWeekBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n                        <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:7px;\">\n                          <div style=\"width:100%;height:{{ b.height }};background:var(--chart-1);border-radius:5px 5px 0 0;min-height:4px;\"><\u002Fdiv>\n                          <span style=\"font-size:10.5px;color:var(--muted-foreground);\">{{ b.label }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- seller ranking card -->\n                <div style=\"background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);\">\n                  <div style=\"font-size:12.5px;font-weight:600;margin-bottom:14px;\">Top vendedores · esta semana<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:12px;\">\n                    <sc-for list=\"{{ cpSellers }}\" as=\"s\" hint-placeholder-count=\"5\">\n                      <div>\n                        <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:12.5px;margin-bottom:5px;\">\n                          <span style=\"font-weight:500;\">{{ s.name }}<\u002Fspan>\n                          <span style=\"display:flex;align-items:center;gap:8px;\"><span class=\"mono\" style=\"color:var(--muted-foreground);\">{{ s.val }}<\u002Fspan><span style=\"font-weight:600;color:{{ s.dcolor }};font-size:11.5px;\">{{ s.delta }}<\u002Fspan><\u002Fspan>\n                        <\u002Fdiv>\n                        <div style=\"height:7px;border-radius:6px;background:var(--muted);overflow:hidden;\"><div style=\"height:100%;width:{{ s.width }};background:var(--chart-1);border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <!-- insights -->\n                <div style=\"display:flex;flex-direction:column;gap:9px;\">\n                  <sc-for list=\"{{ cpInsights }}\" as=\"i\" hint-placeholder-count=\"2\">\n                    <div style=\"display:flex;align-items:center;gap:10px;font-size:13px;padding:11px 14px;border-radius:10px;background:var(--muted);\">\n                      <i data-lucide=\"{{ i.icon }}\" style=\"width:16px;height:16px;color:{{ i.color }};flex-shrink:0;\"><\u002Fi><span>{{ i.text }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;\">\n                  <span style=\"font-size:12px;color:var(--muted-foreground);display:flex;align-items:center;gap:6px;\"><i data-lucide=\"check-circle-2\" style=\"width:13px;height:13px;color:var(--primary);\"><\u002Fi>Basado en datos de 156 órdenes · actualizado hace 2s<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- suggestion chips -->\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:6px;\">\n            <sc-for list=\"{{ suggestions }}\" as=\"s\" hint-placeholder-count=\"5\">\n              <button class=\"pill\" style=\"border:1px solid var(--border);background:var(--card);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:500;padding:8px 13px;border-radius:20px;color:var(--muted-foreground);box-shadow:var(--shadow);\">{{ s }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- composer -->\n        <div style=\"position:sticky;bottom:0;padding:14px 0 4px;background:linear-gradient(to top,var(--background) 70%,transparent);\">\n          <div style=\"display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px 8px 8px 18px;box-shadow:var(--shadow);\">\n            <i data-lucide=\"message-circle\" style=\"width:18px;height:18px;color:var(--muted-foreground);flex-shrink:0;\"><\u002Fi>\n            <span style=\"flex:1;font-size:13.5px;color:var(--muted-foreground);\">Preguntá sobre tu marketplace…<\u002Fspan>\n            <span style=\"font-size:11px;color:var(--muted-foreground);background:var(--muted);padding:3px 8px;border-radius:6px;\" class=\"mono\">⏎<\u002Fspan>\n            <button style=\"width:38px;height:38px;border:none;border-radius:10px;background:var(--primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;\"><i data-lucide=\"arrow-up\" style=\"width:18px;height:18px;\"><\u002Fi><\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;font-size:11px;color:var(--muted-foreground);\">\n            <i data-lucide=\"info\" style=\"width:12px;height:12px;\"><\u002Fi>El copiloto puede cometer errores. Verificá los datos importantes.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ OTHER SCREENS (stubs, filled next) ============ -->\n      <div style=\"display:{{ stubDisplay }};\">\n        <div style=\"max-width:1180px;margin:60px auto;text-align:center;\">\n          <div style=\"width:60px;height:60px;border-radius:16px;background:var(--muted);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;\">\n            <i data-lucide=\"hammer\" style=\"width:26px;height:26px;color:var(--muted-foreground);\"><\u002Fi>\n          <\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:650;margin-bottom:6px;\">{{ title }}<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:var(--muted-foreground);max-width:420px;margin:0 auto;\">Esta pantalla se construye a continuación. La navegación, el tema y el Resumen Ejecutivo ya están listos.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { screen: 'overview', dark: false };\n\n  componentDidMount(){ this._icons(); }\n  componentDidUpdate(){ this._icons(); }\n  _icons(){\n    const run = () => {\n      if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();\n      else this._t = setTimeout(run, 90);\n    };\n    run();\n  }\n\n  go(id){ return () => this.setState({ screen: id }); }\n\n  _up(v){ return {deltaColor:'var(--primary)', deltaBg:'color-mix(in srgb,var(--primary) 13%,transparent)', deltaIcon:'arrow-up-right', delta:v}; }\n  _dn(v){ return {deltaColor:'var(--destructive)', deltaBg:'color-mix(in srgb,var(--destructive) 13%,transparent)', deltaIcon:'arrow-down-right', delta:v}; }\n  _flat(v){ return {deltaColor:'var(--muted-foreground)', deltaBg:'var(--muted)', deltaIcon:'minus', delta:v}; }\n  _kpi(label, value, icon, d, vals, color){\n    const sp=this._spark(vals,110,34,3);\n    return { label, value, icon, ...d, sparkLine:sp.line, sparkArea:sp.area,\n      sparkStroke:color, sparkFill:'color-mix(in srgb,'+color+' 16%,transparent)' };\n  }\n  _line(vals,w,h,p){ return this._spark(vals,w,h,p).line; }\n  _line2(a,b,w,h,p){\n    p=p==null?6:p;\n    const all=a.concat(b), mn=Math.min(...all), mx=Math.max(...all), r=(mx-mn)||1;\n    const path=arr=>{const n=arr.length,x=i=>p+(i/(n-1))*(w-2*p),y=v=>(h-p)-((v-mn)/r)*(h-2*p);\n      return arr.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');};\n    return { a:path(a), b:path(b) };\n  }\n  _linesN(arrays,w,h,p){\n    p=p==null?6:p;\n    const all=[].concat(...arrays), mn=Math.min(...all), mx=Math.max(...all), r=(mx-mn)||1;\n    return arrays.map(arr=>{const n=arr.length,x=i=>p+(i/(n-1))*(w-2*p),y=v=>(h-p)-((v-mn)/r)*(h-2*p);\n      return arr.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');});\n  }\n  _bars(items, colorFn){\n    const mx=Math.max(...items.map(i=>i.v))||1;\n    return items.map((it,i)=>({...it, width:(it.v/mx*100).toFixed(1)+'%', color:colorFn?colorFn(i):'var(--chart-1)'}));\n  }\n\n  // ---- chart helpers (viewBox coords) ----\n  _spark(vals, w, h, p){\n    p = p==null?3:p;\n    const mn=Math.min(...vals), mx=Math.max(...vals), r=(mx-mn)||1, n=vals.length;\n    const x=i=>p+(i/(n-1))*(w-2*p), y=v=>(h-p)-((v-mn)/r)*(h-2*p);\n    const line=vals.map((v,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ');\n    const area='M'+x(0).toFixed(1)+' '+h+' '+vals.map((v,i)=>'L'+x(i).toFixed(1)+' '+y(v).toFixed(1)).join(' ')+' L'+x(n-1).toFixed(1)+' '+h+' Z';\n    return { line, area };\n  }\n\n  renderVals(){\n    const s = this.state.screen;\n    const dark = this.state.dark;\n    const muted='var(--sidebar-muted)';\n\n    const navDef = [\n      ['overview','Resumen Ejecutivo','layout-dashboard'],\n      ['sales','Análisis de Ventas','trending
